services:
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    # Mode "server" tout-en-un (master + volume + filer) avec passerelle S3 activee
    command: server -dir=/data -s3 -s3.config=/etc/seaweedfs/s3.json -master.volumeSizeLimitMB=1024
    ports:
      - "8333:8333"   # API S3
      - "9333:9333"   # UI master
      - "8888:8888"   # filer
    volumes:
      - seaweed_data:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro

  seaweedfs-init:
    image: minio/mc:latest
    depends_on: [seaweedfs]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://seaweedfs:8333 minio minio12345; do echo 'waiting for seaweedfs...'; sleep 2; done;
      mc mb -p local/bronze local/silver local/gold;
      exit 0;"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app12345
      POSTGRES_DB: gold
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d gold"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow:
    image: apache/airflow:2.10.4
    depends_on: [postgres]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://app:app12345@postgres/gold
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    ports: ["8080:8080"]
    # ./Data monte en lecture seule : le DAG bronze lit les CSV sous /opt/airflow/data/raw
    volumes: ["./dags:/opt/airflow/dags", "./Data:/opt/airflow/data:ro"]
    command: standalone

  # Image Superset custom : ajoute le driver psycopg2 (absent de l'image officielle).
  # superset-init prepare la base de metadonnees puis enregistre la connexion GOLD,
  # avant que le service superset ne serve l'UI.
  superset-init:
    build: ./superset
    image: superset-gold:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Doit etre identique au service superset : sert a chiffrer/dechiffrer
      # le mot de passe de la connexion GOLD stocke en base de metadonnees.
      SUPERSET_SECRET_KEY: change_me_please
    volumes: ["superset_home:/app/superset_home"]
    # Migrations -> compte admin (admin/admin) -> roles/permissions -> connexion GOLD.
    # Chaque etape est idempotente : le conteneur peut etre rejoue sans effet de bord.
    entrypoint:
      - /bin/bash
      - -c
      - >
        superset db upgrade &&
        (superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin || true) &&
        superset init &&
        python /app/register_gold.py
    restart: "no"

  superset:
    build: ./superset
    image: superset-gold:local
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment:
      SUPERSET_SECRET_KEY: change_me_please
    ports: ["8088:8088"]
    volumes: ["superset_home:/app/superset_home"]

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]
    # GPU NVIDIA active
    deploy:
      resources:
        reservations:
          devices: [{ driver: nvidia, count: 1, capabilities: [gpu] }]

  ollama-init:
    image: ollama/ollama:latest
    depends_on: [ollama]
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    # Attend qu'Ollama reponde, puis telecharge le modele (idempotent : rien si deja present)
    entrypoint: >
      /bin/sh -c "
      until ollama list >/dev/null 2>&1; do echo 'waiting for ollama...'; sleep 2; done;
      ollama pull qwen3:8b;
      exit 0;"
    restart: "no"

  nl2sql-app:
    build: ./nl2sql-app          # Streamlit + client Ollama + validation SQL
    environment:
      # Sur le reseau Compose, on vise les services par leur nom (pas localhost).
      GOLD_HOST: postgres                       # base GOLD interrogee en lecture seule
      OLLAMA_BASE_URL: "http://ollama:11434"    # API native Ollama (pas /v1)
      OLLAMA_MODEL: "qwen3:8b"
      NL2SQL_LOG_LEVEL: "INFO"
    ports: ["8501:8501"]
    depends_on:
      postgres:
        condition: service_healthy   # attend que la base accepte les connexions
      ollama:
        condition: service_started
    restart: unless-stopped

volumes:
  seaweed_data:
  pg_data:
  superset_home:
  ollama_data:
